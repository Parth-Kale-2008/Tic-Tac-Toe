<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="msg-container hide" role="status" aria-live="polite">
    <p id="msg"></p>
  </div>

  <main>
    <h1>Tick-Tac-Toe</h1>

    <div class="container">
    <div class="game" aria-label="Tic Tac Toe board" role="grid">
        <button class="box" aria-label="cell 1" role="gridcell"></button>
        <button class="box" aria-label="cell 2" role="gridcell"></button>
        <button class="box" aria-label="cell 3" role="gridcell"></button>
        <button class="box" aria-label="cell 4" role="gridcell"></button>
        <button class="box" aria-label="cell 5" role="gridcell"></button>
        <button class="box" aria-label="cell 6" role="gridcell"></button>
        <button class="box" aria-label="cell 7" role="gridcell"></button>
        <button class="box" aria-label="cell 8" role="gridcell"></button>
        <button class="box" aria-label="cell 9" role="gridcell"></button>
    </div>
    </div>

    <button id="reset-btn" aria-label="Reset Game">Reset Game</button>
    <button id="new-btn" aria-label="New Game" style="display:none;">New Game</button>
  </main>

  <script src="abc.js"></script>
</body>
</html>
